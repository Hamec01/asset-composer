kind = "web"
previewPath = "/"
title = "Asset Composer IDE"
version = "1.0.0"
id = "artifacts/asset-composer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18579

[services.development]
run = "pnpm --filter @workspace/asset-composer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/asset-composer", "run", "build" ]
publicDir = "artifacts/asset-composer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18579"
BASE_PATH = "/"
