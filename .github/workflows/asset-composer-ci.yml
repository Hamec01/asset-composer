name: Asset Composer CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: corepack pnpm --filter @workspace/asset-composer run test:run

      - name: Typecheck
        run: corepack pnpm --filter @workspace/asset-composer run typecheck

      - name: Build
        run: corepack pnpm --filter @workspace/asset-composer run build

  package-windows:
    name: Package Windows Desktop
    runs-on: windows-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows package
        run: corepack pnpm --filter @workspace/asset-composer package:win

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-composer-win-package
          path: artifacts/asset-composer/dist/desktop/**
          if-no-files-found: error
